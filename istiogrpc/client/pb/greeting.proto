syntax = "proto3";

package greeting;

option go_package = "github.com/srinman/istiogrpc/client/pb";

service Greeter {
  rpc SayHello (HelloRequest) returns (HelloReply) {}
}

message HelloRequest {
  string name = 1;
}

message HelloReply {
  string message   = 1;
  string server_ip = 2;
  string hostname  = 3;
  string timestamp = 4;
}
